<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Toc Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="player">
                <input type="text" id ="player1" placeholder = "Player 1 (X)">
                <input type="text" id = "player2" placeholder="Player 2 (O)">
               
            </div>
             <button class="startBtn">START GAME</button>

            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <div class="message hide">
                    <p id="msg">Winner</p>
                </div>
                

            </div>
            <button class="resetBtn">Reset Game</button>
        </div>

    </main>
    <script src="script.js"></script>
    
</body>
</html>
